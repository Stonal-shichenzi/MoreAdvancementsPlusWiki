<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="icon" type="image/png" href="icon.png">
        <title>More Advancements Plus Wiki</title>
        <style>
            * {
                font-family: Arial, "SimHei", "黑体", "Noto Sans SC", sans-serif;
            }
            #homepage_border {
                border-radius: 5px;
                border: 2px solid silver;
                background-color: lightgrey;
                cursor: default;
            }
            .homepage_inner {
                background-color: whitesmoke;
                display: inline-block;
                width: calc(var(--width_of_border) * 0.5 - 4.25px);
                cursor: pointer;
            }
            a:link {
                color: blue;
                text-decoration: none;
            }
            a:visited {
                color: MediumBlue;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }
            table {
                border-collapse: collapse;
                border: 1px solid black;
            }
            tr {
                border: 1px solid black;
            }
            th {
                border: 1px solid black;
            }
            td {
                border: 1px solid black;
            }
            pre.samp {
                font-family: "JetBrainsMono", "Consolas", monospace;
            }
            samp {
                font-family: "JetBrainsMono", "Consolas", monospace;
            }
            body {
                overflow: hidden;
            }
            #main {
                position: relative;
                top: 55px;
                overflow: hidden auto;
                height: calc(var(--height_of_window) - 70px);
            }
        </style>
        <script>
            function homepage_resize_update_border(){
                const element_border = document.getElementById("homepage_border");
                element_border_width = element_border.offsetWidth;
                element_border.style.setProperty("--width_of_border", element_border_width + "px");
            }
            window.addEventListener("resize", () => {
                homepage_resize_update_border();
            });
        </script>
    </head>
    <body>
        <div style="position: absolute; margin: 16px; left: 0px; right: 0px; top: 0px;">
            <div id="homepage_border">
                <div class="homepage_inner" onclick="window.location.href = 'index.html';">
                    <p style="padding: 5px; margin: 0; text-align: center; color: black; text-decoration: none;">More Advancements</p>
                </div>
                <div class="homepage_inner" style="background-color: lightskyblue;">
                    <p style="padding: 5px; margin: 0; text-align: center;">More Advancements Plus</p>
                </div>
            </div>
        </div>
        <script>
            homepage_resize_update_border();
        </script>
        <div id="main">
            <h1 style="font-family: Cambria, 'Times New Roman', SimSun, serif; margin: 5px;">更多进度 (扩展)</h1>
            <hr>
            <p style="margin: 5px;"><b>More Advancements Plus</b>是<a href="madv_plus/author.html">石辰子</a>制作的一个<a href="index.html">More Advancements</a>的扩展(<a href="madv_plus/version.html">版本记录</a>)，<a href="madv_plus/adv.html">新增进度</a>16个。</p>
        </div>
    </body>
</html>
